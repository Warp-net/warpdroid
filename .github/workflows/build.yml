name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify warpnet.aar checksum
        working-directory: warpnet-transport/libs
        run: sha256sum -c warpnet.aar.sha256

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew :warpnet-transport:testDebugUnitTest :app:testDebugUnitTest --stacktrace
