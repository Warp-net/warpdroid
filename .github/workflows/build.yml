name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Diagnose warpnet.aar
        run: |
          ls -la warpnet-transport/libs/ || true
          echo "--- expected checksum:"
          cat warpnet-transport/libs/warpnet.aar.sha256 || true
          echo "--- actual sha256:"
          sha256sum warpnet-transport/libs/warpnet.aar || true
          echo "--- first 4 bytes (PK header expected):"
          head -c 4 warpnet-transport/libs/warpnet.aar | xxd || true

      - name: Verify warpnet.aar checksum
        run: ./gradlew :warpnet-transport:verifyWarpnetAarChecksum --stacktrace --info

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew :warpnet-transport:testDebugUnitTest :app:testDebugUnitTest --stacktrace
