name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify warpnet.aar checksum
        working-directory: warpnet-transport/libs
        run: sha256sum -c warpnet.aar.sha256

      - name: Assemble debug APK
        id: assemble
        run: |
          set -o pipefail
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee assemble.log

      - name: Run unit tests
        id: unit_tests
        run: |
          set -o pipefail
          ./gradlew :warpnet-transport:testDebugUnitTest :app:testDebugUnitTest --stacktrace 2>&1 | tee unit-tests.log

      - name: Post build failure as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tail = (path, bytes = 60000) => {
              if (!fs.existsSync(path)) return `(no ${path} produced)`;
              const stat = fs.statSync(path);
              const start = Math.max(0, stat.size - bytes);
              const fd = fs.openSync(path, 'r');
              const buf = Buffer.alloc(stat.size - start);
              fs.readSync(fd, buf, 0, buf.length, start);
              fs.closeSync(fd);
              return buf.toString('utf8');
            };
            const assembleLog = tail('assemble.log');
            const unitTestsLog = tail('unit-tests.log');
            const body = [
              `## CI build failure (\`${context.sha.substring(0, 7)}\`)`,
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '<details><summary><code>:app:assembleDebug</code> (last 60 KB)</summary>',
              '',
              '```',
              assembleLog,
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Unit tests (last 60 KB)</summary>',
              '',
              '```',
              unitTestsLog,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
